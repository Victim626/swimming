spring.application.name=swimming

spring.datasource.url=jdbc:mysql://localhost:3306/swimming_coach_platform?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCPè¿æ¥æ± éç½®
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.usbtj.springboot.swimming.entity
mybatis.configuration.map-underscore-to-camel-case=true

server.port=8081
server.servlet.context-path=/mySpringBoot

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
